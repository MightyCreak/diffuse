name: CI

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the default branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  lint:
    runs-on: ubuntu-26.04
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
          python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update && sudo apt-get -y install libcairo2-dev libgirepository-2.0-dev
        pip install -r requirements.dev.txt
        pip list

    - name: Flake8
      run: |
        flake8 --version
        flake8 src/ po/

    - name: MyPy
      run: |
        mypy --version
        mypy src/ po/

  meson-build-test:
    runs-on: ubuntu-26.04
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
          python-version: '3.10'
    - run: sudo apt-get update && sudo apt-get -y install libglib2.0-dev-bin meson appstream desktop-file-utils gettext
    - run: meson setup build
    - run: meson compile -C build
    - run: meson test --print-errorlogs -C build

  flatpak-build-test:
    runs-on: ubuntu-26.04
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
          python-version: '3.10'
    - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
      with:
        bundle: "diffuse.flatpak"
        manifest-path: "io.github.mightycreak.Diffuse.yml"
        cache-key: flatpak-builder-${{ github.sha }}
        run-tests: "true"
